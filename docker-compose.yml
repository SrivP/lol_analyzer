services:
  postgres:
    image: postgres:16
    container_name: league-coach-db
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis-cache:
    image: redis:7-alpine
    container_name: league-coach-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  postgres_data:
